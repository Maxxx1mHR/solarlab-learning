<div class="product container">
  <div>
    <h3 class="product__title">{{ selectedProduct()?.title }}</h3>
    <p-galleria
      [value]="[selectedProduct()?.imageSrc]"
      [containerStyle]="{ 'max-width': '640px' }"
      [numVisible]="5"
    >
      <ng-template #item let-item>
        <img [src]="item" style="width: 100%" />
      </ng-template>
      <ng-template #thumbnail let-item>
        <img [src]="item" style="width: 120px" />
      </ng-template>
    </p-galleria>
  </div>
  <div>
    <h3 class="product__price">{{ selectedProduct()?.price }} ₽</h3>
    <div>
      <h4>Адрес</h4>
      <div>{{ selectedProduct()?.location }}</div>
    </div>
  </div>
</div>
