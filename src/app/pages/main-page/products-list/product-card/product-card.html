<div class="product-card">
  <img
    class="product-card__image"
    [src]="product.imageSrc"
    [alt]="product.title"
  />
  <a routerLink="/product/{{ product.id }}" class="product-card__title">
    {{ product.title }}
  </a>
  <h6 class="product-card__price">{{ product.price }} ₽</h6>
  <div class="product-card__location">{{ product.location }}</div>
  <div class="product-card__date">{{ product.publishDate }}</div>
</div>
